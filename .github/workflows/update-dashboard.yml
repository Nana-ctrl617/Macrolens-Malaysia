name: Update MacroLens dashboard

on:
  schedule:
    - cron: "45 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macrolens-data-refresh
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - run: pytest -q pipeline/tests
      - run: python pipeline/macrolens.py
      - name: Commit validated changes
        run: |
          if git diff --quiet -- data/published data/vintages; then
            echo "Official data are unchanged."
            exit 0
          fi
          git config user.name "macrolens-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/published data/vintages
          git commit -m "data: refresh dashboard $(date -u +%F)"
          git push

